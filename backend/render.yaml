services:
  - type: web
    name: asset-inventory-backend
    env: python
    pythonVersion: "3.12.7"  # ✅ FIXED
    buildCommand: "pip install -r requirements.txt"
    startCommand: "bash start.sh"
    envVars:
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: asset_inventory
          property: connectionString