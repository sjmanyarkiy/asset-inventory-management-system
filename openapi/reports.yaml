openapi: 3.0.3
info:
  title: Asset Inventory Reports API
  version: 1.0.0
paths:
  /api/reports/assigned:
    get:
      summary: Get assigned assets
      parameters:
        - in: query
          name: user_id
          schema:
            type: integer
        - in: query
          name: location
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: per_page
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Assigned assets list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/AssignedItem'
                  total:
                    type: integer
components:
  schemas:
    AssignedItem:
      type: object
      properties:
        asset_id:
          type: integer
        asset_tag:
          type: string
        asset_name:
          type: string
        assigned_to:
          type: object
          properties:
            id:
              type: integer
            name:
              type: string
        assigned_at:
          type: string
          format: date-time
