services:
  - type: web
    name: asset-inventory-backend
    env: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt && python init_db.py
    startCommand: gunicorn --config gunicorn_config.py wsgi:app
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DEFAULT_ADMIN_PASSWORD
        value: Admin@12345
      - key: DEFAULT_ADMIN_EMAIL
        value: admin@assetinventory.local
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false

  - type: static
    name: asset-inventory-frontend
    rootDir: frontend
    buildCommand: npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
