name: Routing Guard

on:
  pull_request:
  merge_group:
  workflow_dispatch:

env:
  CI: true

jobs:
  frontend-e2e-routing:
    name: frontend-e2e-routing
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Cache frontend node_modules
        id: cache-frontend-node-modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: frontend-node-modules-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Install frontend dependencies
        if: steps.cache-frontend-node-modules.outputs.cache-hit != 'true'
        run: npm ci --prefix frontend

      - name: Cache Playwright browser binaries
        id: cache-playwright-browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright browser
        if: steps.cache-playwright-browsers.outputs.cache-hit != 'true'
        run: |
          cd frontend
          npx playwright install --with-deps chromium

      - name: Run routing consistency Playwright smoke
        run: |
          cd frontend
          PW_BACKEND_URL=http://127.0.0.1:5002 npx playwright test e2e/api-routing-consistency.spec.js --project=chromium --reporter=line

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-routing-smoke
          path: |
            frontend/playwright-report
            frontend/test-results
          retention-days: 14

  backend-route-compat:
    name: backend-route-compat
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run backend legacy/api compatibility tests
        run: |
          cd backend
          pytest -q tests/test_dual_route_compatibility.py
